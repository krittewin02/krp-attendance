<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRT PIT - Management System</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Thai', sans-serif; }
        body { 
            background: #0f172a; 
            background-image: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(245, 158, 11, 0.2);
            backdrop-filter: blur(10px);
        }
        .nav-active {
            background: #f59e0b !important;
            color: #0f172a !important;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* สไตล์ปุ่มยืนยันให้ชัดเจนตามรูป */
        .btn-confirm {
            background: #f59e0b;
            color: #000;
            font-weight: 800;
            box-shadow: 0 6px 0 #b45309;
            transition: all 0.1s;
        }
        .btn-confirm:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b45309;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-amber-500/20 flex flex-col p-6">
        <div class="mb-10 text-center">
            <div class="w-20 h-20 gold-gradient rounded-3xl mx-auto flex items-center justify-center mb-4 shadow-xl">
                <i data-lucide="school" class="text-slate-900 w-10 h-10"></i>
            </div>
            <h1 class="text-xl font-black text-amber-500 tracking-tight">KORAT PIT</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Attendance System</p>
        </div>

        <nav class="flex-1 space-y-2">
            <button onclick="showPage('checkin')" id="btn-nav-checkin" class="nav-active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all">
                <i data-lucide="user-check"></i> ลงเวลาปฏิบัติงาน
            </button>
            <button onclick="checkAdmin()" id="btn-nav-admin" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-white/5 transition-all">
                <i data-lucide="settings"></i> จัดการบุคลากร
            </button>
        </nav>

        <button id="logout-btn" onclick="adminLogout()" class="hidden w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-rose-400 bg-rose-400/10 mt-4">
            <i data-lucide="log-out"></i> ออกจากระบบ
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-auto">
        
        <header class="flex justify-between items-end mb-8 border-b border-amber-500/20 pb-6">
            <div>
                <h2 id="page-title" class="text-3xl font-black text-white">ลงเวลาปฏิบัติราชการ</h2>
                <p id="live-date" class="text-amber-500 font-medium"></p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase font-bold mb-1">เวลาปัจจุบัน</p>
                <p id="live-time" class="text-4xl font-black text-white leading-none">00:00:00</p>
            </div>
        </header>

        <div id="page-checkin" class="page active space-y-6">
            <div class="glass-card p-10 rounded-[32px] shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-3">
                        <label class="text-sm font-bold text-amber-500 uppercase">1. เลือกรายชื่อบุคลากร</label>
                        <select id="staff-select" class="w-full h-16 bg-slate-800 border-2 border-amber-500/30 rounded-2xl px-6 text-xl font-bold text-white outline-none focus:border-amber-500"></select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-sm font-bold text-amber-500 uppercase">2. เลือกประเภท</label>
                        <select id="checkin-type" class="w-full h-16 bg-slate-800 border-2 border-amber-500/30 rounded-2xl px-6 text-xl font-bold text-white outline-none focus:border-amber-500">
                            <option value="in">🕒 ลงเวลาเข้างาน</option>
                            <option value="out">🏠 ลงเวลากลับบ้าน</option>
                        </select>
                    </div>
                </div>
                <button onclick="handleCheckIn()" class="btn-confirm w-full h-20 rounded-2xl text-2xl flex items-center justify-center gap-4">
                    <i data-lucide="save" class="w-8 h-8"></i> บันทึกข้อมูล
                </button>
            </div>

            <div class="glass-card rounded-[32px] overflow-hidden">
                <div class="p-6 border-b border-white/5 bg-white/5 font-bold text-amber-500">ประวัติการลงเวลาวันนี้</div>
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-xs font-bold text-slate-400 uppercase">
                        <tr><th class="p-5">รหัส</th><th class="p-5">ชื่อ-นามสกุล</th><th class="p-5">เวลาเข้า</th><th class="p-5">เวลากลับ</th><th class="p-5 text-center">สถานะ</th></tr>
                    </thead>
                    <tbody id="attendance-list" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass-card p-8 rounded-[32px] space-y-6 border-emerald-500/30">
                    <h3 class="text-xl font-bold text-emerald-400 flex items-center gap-2">
                        <i data-lucide="user-plus"></i> เพิ่มรายชื่อใหม่
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="new-id" class="w-full h-12 bg-slate-900 border border-white/10 rounded-xl px-4 text-white" placeholder="รหัสบุคลากร (เช่น K20)">
                        <input type="text" id="new-name" class="w-full h-12 bg-slate-900 border border-white/10 rounded-xl px-4 text-white" placeholder="ชื่อ-นามสกุล">
                        <button onclick="addStaff()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-black text-white transition-all">เพิ่มรายชื่อ</button>
                    </div>
                </div>

                <div class="lg:col-span-2 glass-card rounded-[32px] overflow-hidden border-amber-500/30">
                    <div class="p-6 bg-amber-500/10 border-b border-amber-500/20 font-bold">รายชื่อบุคลากรทั้งหมดในระบบ</div>
                    <div class="max-h-[500px] overflow-auto">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-slate-800 text-xs text-slate-400">
                                <tr><th class="p-4">รหัส</th><th class="p-4">ชื่อ-นามสกุล</th><th class="p-4 text-center">จัดการ</th></tr>
                            </thead>
                            <tbody id="manage-staff-list" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="exportToExcel()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-bold">ดาวน์โหลดรายงาน Excel</button>
                <button onclick="clearHistory()" class="flex-1 py-4 bg-rose-900/30 border border-rose-500/50 text-rose-400 rounded-2xl font-bold">ล้างประวัติลงเวลา</button>
            </div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden z-50 items-center justify-center p-4">
        <div class="glass-card p-10 w-full max-w-sm rounded-[40px] text-center border-amber-500">
            <h3 class="text-2xl font-black text-white mb-6">ADMIN LOGIN</h3>
            <input type="password" id="admin-pass" class="w-full h-16 rounded-2xl text-center text-3xl mb-6 bg-slate-900 border-2 border-amber-500 text-white outline-none" placeholder="••••">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 h-14 rounded-xl font-bold bg-white/10 text-white">ยกเลิก</button>
                <button onclick="tryLogin()" class="flex-1 h-14 rounded-xl font-bold gold-gradient text-slate-900">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        // 1. ระบบจัดการรายชื่อบุคลากร
        const DEFAULT_STAFF = [
            {id:'K01',name:'นางมัสธุรส ผ่องสุข'},{id:'K02',name:'นางปวีณา จันทร์คำวงษ์'},{id:'K03',name:'นางสาวศศิวิมล เกิดหมื่นไวย'},
            {id:'K06',name:'นางสาววรารัตน์ เลิศแก้ว'},{id:'K07',name:'นางสุภาพร พรพิมานแมน'},{id:'K08',name:'นางสาวจันจิรา รักษาราช'},
            {id:'K11',name:'นายกิติพงศ์ เพ็งวิสาภาพพงษ์'},{id:'K12',name:'นางจันฑิมา ทองภูบาล'},{id:'K13',name:'นางศิริวรรณ ไม้พรต'},
            {id:'K14',name:'นางสาวสุกัญญา ชอบรัก'},{id:'K16',name:'นายขจรศักดิ์ วิวัฒน์วรรธนะ'},{id:'K17',name:'นางสาวรัชดาลัย ศิรินนท์'},{id:'K18',name:'นางสาวเกวลี จุลนาค'}
        ];

        let staffList = JSON.parse(localStorage.getItem('krt_staff_list')) || DEFAULT_STAFF;
        let attendance = JSON.parse(localStorage.getItem('krt_attendance_v5')) || [];
        let isAdmin = false;

        function init() {
            lucide.createIcons();
            setInterval(updateClock, 1000);
            updateStaffDropdown();
            renderAttendance();
            renderManageStaff();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').textContent = now.toLocaleTimeString('th-TH', {hour12:false});
            document.getElementById('live-date').textContent = now.toLocaleDateString('th-TH', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }

        function updateStaffDropdown() {
            const select = document.getElementById('staff-select');
            select.innerHTML = '<option value="" disabled selected>กรุณาเลือกชื่อของคุณ...</option>' + 
                staffList.map(s => `<option value="${s.id}">${s.id} - ${s.name}</option>`).join('');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.getElementById('btn-nav-checkin').classList.remove('nav-active');
            document.getElementById('btn-nav-admin').classList.remove('nav-active');
            document.getElementById('btn-nav-' + pageId).classList.add('nav-active');
            
            document.getElementById('page-title').textContent = (pageId === 'admin') ? 'จัดการรายชื่อบุคลากร' : 'ลงเวลาปฏิบัติราชการ';
        }

        function checkAdmin() {
            if (isAdmin) showPage('admin'); else document.getElementById('login-modal').style.display = 'flex';
        }

        function tryLogin() {
            if(document.getElementById('admin-pass').value === 'admin1234') {
                isAdmin = true;
                closeModal();
                showPage('admin');
                document.getElementById('logout-btn').classList.remove('hidden');
                lucide.createIcons();
            } else { alert('รหัสผ่านไม่ถูกต้อง'); }
        }

        function closeModal() { document.getElementById('login-modal').style.display = 'none'; document.getElementById('admin-pass').value = ''; }
        function adminLogout() { isAdmin = false; document.getElementById('logout-btn').classList.add('hidden'); showPage('checkin'); lucide.createIcons(); }

        // --- ระบบเพิ่ม/ลบ รายชื่อ ---
        function renderManageStaff() {
            const body = document.getElementById('manage-staff-list');
            body.innerHTML = staffList.map(s => `
                <tr class="hover:bg-white/5">
                    <td class="p-4 text-amber-500 font-bold">${s.id}</td>
                    <td class="p-4 font-bold text-white">${s.name}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteStaff('${s.id}')" class="text-rose-500 hover:text-rose-400 p-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function addStaff() {
            const id = document.getElementById('new-id').value.trim();
            const name = document.getElementById('new-name').value.trim();
            if(!id || !name) return alert('กรุณากรอกรหัสและชื่อให้ครบ');
            if(staffList.find(s => s.id === id)) return alert('รหัสนี้มีในระบบแล้ว');

            staffList.push({id, name});
            saveStaff();
            document.getElementById('new-id').value = '';
            document.getElementById('new-name').value = '';
            alert('เพิ่มรายชื่อสำเร็จ');
        }

        function deleteStaff(id) {
            if(confirm('ยืนยันการลบรายชื่อนี้?')) {
                staffList = staffList.filter(s => s.id !== id);
                saveStaff();
            }
        }

        function saveStaff() {
            localStorage.setItem('krt_staff_list', JSON.stringify(staffList));
            updateStaffDropdown();
            renderManageStaff();
        }

        // --- ระบบลงเวลา ---
        function handleCheckIn() {
            const id = document.getElementById('staff-select').value;
            const type = document.getElementById('checkin-type').value;
            if(!id) return alert('กรุณาเลือกชื่อ');
            
            const now = new Date();
            const date = now.toLocaleDateString('th-TH');
            const time = now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', hour12:false});
            
            let record = attendance.find(r => r.id === id && r.date === date);
            if(!record) {
                record = { id, name: staffList.find(s=>s.id===id).name, date, in: '', out: '', status: time > '08:30' ? 'สาย' : 'ปกติ' };
                attendance.push(record);
            }
            if(type === 'in') record.in = time; else record.out = time;
            
            localStorage.setItem('krt_attendance_v5', JSON.stringify(attendance));
            renderAttendance();
            alert('บันทึกสำเร็จ!');
        }

        function renderAttendance() {
            const today = new Date().toLocaleDateString('th-TH');
            const daily = attendance.filter(r => r.date === today);
            const body = document.getElementById('attendance-list');
            body.innerHTML = daily.map(r => `
                <tr class="hover:bg-white/5">
                    <td class="p-5 text-amber-500 font-bold">${r.id}</td>
                    <td class="p-5 font-bold text-white text-base">${r.name}</td>
                    <td class="p-5 text-amber-400 font-bold text-xl">${r.in || '--:--'}</td>
                    <td class="p-5 text-slate-500 font-bold text-xl">${r.out || '--:--'}</td>
                    <td class="p-5 text-center">
                        <span class="px-4 py-1 rounded-full text-[10px] font-black uppercase ${r.status==='สาย'?'bg-rose-500 text-white':'bg-emerald-500 text-white'}">${r.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(attendance);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "KRT_Attendance_Report.xlsx");
        }

        function clearHistory() {
            if(confirm('ลบประวัติลงเวลาทั้งหมด? (ข้อมูลรายชื่อบุคลากรจะไม่ถูกลบ)')) {
                attendance = [];
                localStorage.setItem('krt_attendance_v5', JSON.stringify(attendance));
                renderAttendance();
            }
        }

        init();
    </script>
</body>
</html>
